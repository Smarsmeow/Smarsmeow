<svg width="800" height="180" viewBox="0 0 800 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="vig" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.7"/>
    </radialGradient>
    <radialGradient id="moon" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e1c17"/>
      <stop offset="100%" stop-color="#0f0e0a"/>
    </radialGradient>
  </defs>

  <!-- sky -->
  <rect width="800" height="180" fill="#000"/>

  <!-- moon -->
  <circle cx="670" cy="38" r="22" fill="url(#moon)" stroke="rgba(180,170,155,0.12)" stroke-width="0.5"/>
  <circle cx="676" cy="32" r="4" stroke="rgba(100,92,80,0.3)" stroke-width="0.5" fill="none"/>
  <circle cx="660" cy="44" r="3" stroke="rgba(100,92,80,0.3)" stroke-width="0.5" fill="none"/>

  <!-- stars -->
  <circle cx="40" cy="18" r="0.8" fill="rgba(220,210,195,0.7)"/>
  <circle cx="120" cy="12" r="1.2" fill="rgba(220,210,195,0.5)"/>
  <circle cx="200" cy="22" r="0.9" fill="rgba(220,210,195,0.6)"/>
  <circle cx="310" cy="8" r="1" fill="rgba(220,210,195,0.4)"/>
  <circle cx="450" cy="15" r="0.7" fill="rgba(220,210,195,0.5)"/>
  <circle cx="520" cy="28" r="1.1" fill="rgba(220,210,195,0.6)"/>
  <circle cx="600" cy="10" r="0.8" fill="rgba(220,210,195,0.4)"/>
  <circle cx="740" cy="22" r="1" fill="rgba(220,210,195,0.5)"/>
  <circle cx="760" cy="55" r="0.6" fill="rgba(220,210,195,0.3)"/>
  <circle cx="80" cy="50" r="0.7" fill="rgba(220,210,195,0.4)"/>
  <circle cx="370" cy="35" r="0.9" fill="rgba(220,210,195,0.5)"/>

  <!-- bg pillars -->
  <rect x="30" y="65" width="14" height="65" fill="#0a0a0a"/>
  <path d="M30 65 Q37 55 44 65" fill="#0a0a0a"/>
  <rect x="90" y="75" width="10" height="55" fill="#0a0a0a"/>
  <path d="M90 75 Q95 67 100 75" fill="#0a0a0a"/>
  <rect x="160" y="58" width="16" height="72" fill="#0a0a0a"/>
  <path d="M160 58 Q168 47 176 58" fill="#0a0a0a"/>
  <rect x="250" y="70" width="12" height="60" fill="#0a0a0a"/>
  <path d="M250 70 Q256 62 262 70" fill="#0a0a0a"/>
  <rect x="340" y="62" width="14" height="68" fill="#0a0a0a"/>
  <path d="M340 62 Q347 52 354 62" fill="#0a0a0a"/>
  <rect x="430" y="72" width="10" height="58" fill="#0a0a0a"/>
  <path d="M430 72 Q435 64 440 72" fill="#0a0a0a"/>
  <rect x="550" y="60" width="15" height="70" fill="#0a0a0a"/>
  <path d="M550 60 Q557.5 50 565 60" fill="#0a0a0a"/>
  <rect x="700" y="68" width="12" height="62" fill="#0a0a0a"/>
  <path d="M700 68 Q706 60 712 68" fill="#0a0a0a"/>

  <!-- mid pillars -->
  <rect x="60" y="95" width="9" height="35" fill="#0d0d0d"/>
  <rect x="190" y="100" width="8" height="30" fill="#0d0d0d"/>
  <rect x="290" y="92" width="10" height="38" fill="#0d0d0d"/>
  <rect x="480" y="98" width="8" height="32" fill="#0d0d0d"/>
  <rect x="620" y="90" width="11" height="40" fill="#0d0d0d"/>

  <!-- ground -->
  <rect x="0" y="130" width="800" height="50" fill="#0d0d0b"/>
  <line x1="0" y1="130" x2="800" y2="130" stroke="rgba(120,110,95,0.2)" stroke-width="0.5"/>

  <!-- obstacle - pillar -->
  <rect x="500" y="98" width="18" height="32" fill="#0e0e0e" stroke="rgba(100,92,80,0.3)" stroke-width="0.5"/>
  <rect x="498" y="98" width="22" height="5" fill="#1a1510"/>
  <rect x="496" y="98" width="26" height="3" fill="#1a1510"/>

  <!-- obstacle - spikes -->
  <polygon points="640,130 649,108 658,130" fill="#111" stroke="rgba(140,130,115,0.2)" stroke-width="0.5"/>
  <polygon points="655,130 664,108 673,130" fill="#111" stroke="rgba(140,130,115,0.2)" stroke-width="0.5"/>

  <!-- player - robed figure -->
  <!-- trail -->
  <rect x="66" y="107" width="13" height="16" fill="rgba(180,170,155,0.04)"/>
  <rect x="72" y="105" width="13" height="16" fill="rgba(180,170,155,0.08)"/>
  <rect x="78" y="103" width="13" height="16" fill="rgba(180,170,155,0.13)"/>
  <!-- cape -->
  <path d="M99 103 Q84 117 86 134 L93 132 Q90 116 99 103Z" fill="rgba(25,20,16,0.95)" stroke="rgba(130,120,108,0.4)" stroke-width="0.5"/>
  <!-- body -->
  <rect x="92" y="109" width="14" height="21" fill="#111"/>
  <!-- hood -->
  <ellipse cx="99" cy="100" rx="9" ry="11" fill="#0d0d0d"/>
  <!-- face void -->
  <ellipse cx="99" cy="101" rx="5" ry="6" fill="#000"/>
  <!-- eye glow -->
  <circle cx="101" cy="100" r="1.2" fill="rgba(220,210,195,0.8)"/>
  <!-- robe detail -->
  <line x1="92" y1="119" x2="106" y2="119" stroke="rgba(100,92,80,0.3)" stroke-width="0.5"/>

  <!-- jump particles -->
  <circle cx="95" cy="136" r="1.5" fill="rgba(180,170,155,0.4)"/>
  <circle cx="103" cy="138" r="1" fill="rgba(180,170,155,0.3)"/>
  <circle cx="108" cy="133" r="1.2" fill="rgba(180,170,155,0.25)"/>

  <!-- score text -->
  <text x="400" y="22" text-anchor="middle" font-family="monospace" font-size="9" fill="rgba(110,102,88,0.7)" letter-spacing="4">V O I D &nbsp; R U N N E R &nbsp; · &nbsp; P K R ™</text>

  <!-- play hint -->
  <text x="400" y="165" text-anchor="middle" font-family="monospace" font-size="8" fill="rgba(110,102,88,0.5)" letter-spacing="3">SPACE · ↑ · TAP &nbsp; to jump &nbsp;·&nbsp; DOUBLE JUMP allowed</text>

  <!-- vignette -->
  <rect width="800" height="180" fill="url(#vig)"/>
</svg>
