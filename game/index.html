<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Void Runner · Smarsmeow</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --void:#000;
  --bone:#ddd5c5;
  --ash:#6e6658;
  --silver:#b0a898;
  --dim:#1a1a1a;
}
html,body{
  width:100%;height:100%;
  background:var(--void);
  color:var(--bone);
  font-family:'Space Mono',monospace;
  overflow:hidden;
  user-select:none;
}

/* grain */
body::before{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  background-size:200px 200px;pointer-events:none;z-index:100;
}

canvas{
  display:block;
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  image-rendering:pixelated;
}

/* UI overlays */
#ui{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:10;pointer-events:none;
}

#score-display{
  position:fixed;top:20px;left:50%;transform:translateX(-50%);
  font-size:11px;letter-spacing:0.4em;color:var(--ash);
  z-index:10;
}
#score-display span{color:var(--silver);}

#screen{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:0;z-index:20;
  background:rgba(0,0,0,0.85);
  transition:opacity 0.5s;
}
#screen.hidden{opacity:0;pointer-events:none;}

#screen-title{
  font-family:'Cinzel',serif;
  font-size:clamp(24px,5vw,42px);
  letter-spacing:0.3em;
  color:var(--bone);
  margin-bottom:8px;
}
#screen-sub{
  font-size:9px;letter-spacing:0.5em;
  color:var(--ash);margin-bottom:40px;
}
#screen-score{
  font-size:11px;letter-spacing:0.3em;
  color:var(--silver);margin-bottom:32px;
  display:none;
}
#screen-btn{
  font-family:'Space Mono',monospace;
  font-size:9px;letter-spacing:0.4em;
  color:var(--ash);
  border:0.5px solid rgba(180,170,155,0.2);
  background:transparent;
  padding:12px 28px;cursor:pointer;
  pointer-events:all;
  transition:all 0.3s;
}
#screen-btn:hover{color:var(--silver);border-color:rgba(180,170,155,0.5);}

#screen-controls{
  position:absolute;bottom:32px;
  font-size:8px;letter-spacing:0.3em;color:var(--ash);
  text-align:center;
}
</style>
</head>
<body>

<div id="score-display">SCORE &nbsp;<span id="live-score">0</span> &nbsp;·&nbsp; BEST &nbsp;<span id="best-score">0</span></div>

<canvas id="c"></canvas>

<div id="screen">
  <div id="screen-title">VOID RUNNER</div>
  <div id="screen-sub">◈ &nbsp; PKR™ &nbsp; ◈</div>
  <div id="screen-score"></div>
  <button id="screen-btn">ENTER THE VOID</button>
  <div id="screen-controls">SPACE · ↑ · TAP &nbsp; to jump &nbsp;·&nbsp; DOUBLE JUMP allowed</div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const screen = document.getElementById('screen');
const screenTitle = document.getElementById('screen-title');
const screenSub = document.getElementById('screen-sub');
const screenScore = document.getElementById('screen-score');
const screenBtn = document.getElementById('screen-btn');
const liveScoreEl = document.getElementById('live-score');
const bestScoreEl = document.getElementById('best-score');

// --- responsive canvas ---
const BASE_W = 800, BASE_H = 300;
let scale = 1;
function resize(){
  const maxW = Math.min(window.innerWidth, window.innerHeight * (BASE_W/BASE_H));
  scale = maxW / BASE_W;
  canvas.width = BASE_W;
  canvas.height = BASE_H;
  canvas.style.width = (BASE_W * scale) + 'px';
  canvas.style.height = (BASE_H * scale) + 'px';
}
window.addEventListener('resize', resize);
resize();

// --- state ---
const GROUND = BASE_H - 50;
let state = 'idle'; // idle | playing | dead
let score = 0, best = 0, frame = 0, speed = 4, scoreTimer = 0;

// --- player ---
const player = {
  x: 100, y: GROUND, w: 22, h: 32,
  vy: 0, jumps: 0, maxJumps: 2,
  dead: false,
  trail: [],
  cape: 0, // cape wave angle
};

const GRAVITY = 0.6;
const JUMP_FORCE = -12;

// --- obstacles ---
let obstacles = [];
let nextObstacle = 80;

// --- bg layers ---
let stars = Array.from({length:60}, ()=>({
  x: Math.random()*BASE_W,
  y: Math.random()*(GROUND-20),
  r: Math.random()*1.5+0.3,
  spd: Math.random()*0.5+0.2,
  a: Math.random()*0.6+0.2
}));

let bgPillars = Array.from({length:8}, (_,i)=>({
  x: i*(BASE_W/6) + Math.random()*60,
  w: Math.random()*18+8,
  h: Math.random()*80+40,
  spd: 0.8
}));

let midPillars = Array.from({length:5}, (_,i)=>({
  x: i*(BASE_W/4) + Math.random()*80,
  w: Math.random()*12+6,
  h: Math.random()*50+20,
  spd: 1.6
}));

// --- particles ---
let particles = [];

function spawnParticle(x, y, type){
  for(let i=0;i<(type==='jump'?6:12);i++){
    particles.push({
      x, y,
      vx: (Math.random()-0.5)*(type==='death'?5:2),
      vy: Math.random()*-3-(type==='death'?2:1),
      life: 1, decay: Math.random()*0.03+0.02,
      r: Math.random()*3+1,
      type
    });
  }
}

function jump(){
  if(state !== 'playing') return;
  if(player.jumps < player.maxJumps){
    player.vy = JUMP_FORCE - (player.jumps * 1.5);
    player.jumps++;
    spawnParticle(player.x + player.w/2, player.y + player.h, 'jump');
  }
}

function startGame(){
  state = 'playing';
  score = 0; frame = 0; speed = 4; scoreTimer = 0;
  player.y = GROUND; player.vy = 0; player.jumps = 0; player.dead = false;
  player.trail = []; player.cape = 0;
  obstacles = []; nextObstacle = 80;
  particles = [];
  screen.classList.add('hidden');
}

function die(){
  state = 'dead';
  player.dead = true;
  spawnParticle(player.x+player.w/2, player.y+player.h/2, 'death');
  if(score > best) best = score;
  bestScoreEl.textContent = best;
  setTimeout(()=>{
    screenTitle.textContent = 'CONSUMED';
    screenSub.textContent = '◈ &nbsp; THE VOID CLAIMED YOU &nbsp; ◈';
    screenScore.style.display = 'block';
    screenScore.textContent = 'SCORE  ' + score + '  ·  BEST  ' + best;
    screenBtn.textContent = 'RISE AGAIN';
    screen.classList.remove('hidden');
  }, 900);
}

// obstacle shapes: pillar, spike, floater
function spawnObstacle(){
  const types = ['pillar','pillar','spike','floater'];
  const type = types[Math.floor(Math.random()*types.length)];
  if(type === 'pillar'){
    const h = Math.random()*50+30;
    obstacles.push({type, x:BASE_W+20, y:GROUND-h+player.h, w:18, h, spd:speed});
  } else if(type === 'spike'){
    obstacles.push({type, x:BASE_W+20, y:GROUND-24, w:22, h:24, spd:speed});
  } else {
    const yOff = Math.random()*60+30;
    obstacles.push({type, x:BASE_W+20, y:GROUND-player.h-yOff, w:20, h:20, spd:speed*0.9});
  }
}

// --- drawing helpers ---
function drawPlayer(){
  const px = player.x, py = player.y;
  const pw = player.w, ph = player.h;
  const cx = px + pw/2;

  // trail
  player.trail.forEach((t,i)=>{
    const a = (i/player.trail.length)*0.25;
    ctx.fillStyle = `rgba(180,170,155,${a})`;
    ctx.fillRect(t.x, t.y+ph*0.3, pw*0.6, ph*0.5);
  });

  if(player.dead) return;

  // cape
  const capeWave = Math.sin(player.cape)*4;
  ctx.beginPath();
  ctx.moveTo(cx-2, py+6);
  ctx.quadraticCurveTo(px-10+capeWave, py+ph*0.6, px-8, py+ph+4);
  ctx.lineTo(px+4, py+ph);
  ctx.quadraticCurveTo(px, py+ph*0.4, cx-2, py+6);
  ctx.fillStyle = 'rgba(30,25,20,0.95)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(130,120,108,0.4)';
  ctx.lineWidth = 0.5;
  ctx.stroke();

  // body — dark robed figure
  ctx.fillStyle = '#111';
  ctx.fillRect(px+4, py+ph*0.35, pw-8, ph*0.65);

  // hood
  ctx.beginPath();
  ctx.ellipse(cx, py+8, 9, 11, 0, 0, Math.PI*2);
  ctx.fillStyle = '#0d0d0d';
  ctx.fill();

  // face shadow (just a dark void in hood)
  ctx.beginPath();
  ctx.ellipse(cx, py+9, 5, 6, 0, 0, Math.PI*2);
  ctx.fillStyle = '#000';
  ctx.fill();

  // eye glow — tiny white dot
  ctx.beginPath();
  ctx.arc(cx+2, py+8, 1.2, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(220,210,195,0.8)';
  ctx.fill();

  // robe hem detail
  ctx.strokeStyle = 'rgba(100,92,80,0.3)';
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.moveTo(px+4, py+ph*0.7);
  ctx.lineTo(px+pw-4, py+ph*0.7);
  ctx.stroke();
}

function drawObstacle(o){
  if(o.type === 'pillar'){
    // dark stone pillar
    ctx.fillStyle = '#0e0e0e';
    ctx.fillRect(o.x, o.y, o.w, o.h);
    // edge highlight
    ctx.strokeStyle = 'rgba(100,92,80,0.3)';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(o.x, o.y, o.w, o.h);
    // cracks
    ctx.strokeStyle = 'rgba(60,55,48,0.5)';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(o.x+5, o.y+10);
    ctx.lineTo(o.x+8, o.y+30);
    ctx.moveTo(o.x+12, o.y+5);
    ctx.lineTo(o.x+10, o.y+20);
    ctx.stroke();
    // top ornament
    ctx.fillStyle = '#1a1510';
    ctx.fillRect(o.x-2, o.y, o.w+4, 5);
    ctx.fillRect(o.x-4, o.y, o.w+8, 3);
  } else if(o.type === 'spike'){
    // spike cluster
    const n = 3;
    const sw = o.w/n;
    for(let i=0;i<n;i++){
      ctx.beginPath();
      ctx.moveTo(o.x + i*sw, o.y+o.h);
      ctx.lineTo(o.x + i*sw + sw*0.5, o.y);
      ctx.lineTo(o.x + i*sw + sw, o.y+o.h);
      ctx.closePath();
      ctx.fillStyle = '#111';
      ctx.fill();
      ctx.strokeStyle = 'rgba(140,130,115,0.2)';
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }
  } else {
    // floater — orbiting eye
    const t = frame*0.05;
    const fy = o.y + Math.sin(t+o.x)*6;
    ctx.beginPath();
    ctx.arc(o.x+o.w/2, fy+o.h/2, o.w/2, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(180,170,155,0.25)';
    ctx.lineWidth = 0.5;
    ctx.stroke();
    // pupil
    ctx.beginPath();
    ctx.ellipse(o.x+o.w/2, fy+o.h/2, 5, 7, 0, 0, Math.PI*2);
    ctx.fillStyle = '#0a0a0a';
    ctx.fill();
    ctx.strokeStyle = 'rgba(180,170,155,0.4)';
    ctx.lineWidth = 0.5;
    ctx.stroke();
    // iris
    ctx.beginPath();
    ctx.arc(o.x+o.w/2, fy+o.h/2, 2, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(220,210,195,0.6)';
    ctx.fill();
  }
}

function drawBg(){
  // sky
  ctx.fillStyle = '#000';
  ctx.fillRect(0,0,BASE_W,BASE_H);

  // moon
  ctx.beginPath();
  ctx.arc(BASE_W*0.8, 40, 22, 0, Math.PI*2);
  ctx.fillStyle = '#1a1814';
  ctx.fill();
  ctx.strokeStyle = 'rgba(180,170,155,0.15)';
  ctx.lineWidth = 0.5;
  ctx.stroke();
  // moon craters
  [[6,-5,4],[12,8,3],[-5,10,2]].forEach(([dx,dy,r])=>{
    ctx.beginPath();
    ctx.arc(BASE_W*0.8+dx, 40+dy, r, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(100,92,80,0.3)';
    ctx.lineWidth = 0.5;
    ctx.stroke();
  });

  // stars
  stars.forEach(s=>{
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(220,210,195,${s.a})`;
    ctx.fill();
  });

  // far bg pillars (silhouette)
  ctx.fillStyle = '#0a0a0a';
  bgPillars.forEach(p=>{
    ctx.fillRect(p.x, GROUND-p.h, p.w, p.h);
    // gothic arch top
    ctx.beginPath();
    ctx.arc(p.x+p.w/2, GROUND-p.h, p.w/2, Math.PI, 0);
    ctx.fill();
  });

  // mid pillars
  ctx.fillStyle = '#0d0d0d';
  midPillars.forEach(p=>{
    ctx.fillRect(p.x, GROUND-p.h, p.w, p.h);
    ctx.beginPath();
    ctx.arc(p.x+p.w/2, GROUND-p.h, p.w/2, Math.PI, 0);
    ctx.fill();
  });

  // ground
  ctx.fillStyle = '#0d0d0b';
  ctx.fillRect(0, GROUND, BASE_W, BASE_H-GROUND);

  // ground line
  ctx.strokeStyle = 'rgba(120,110,95,0.2)';
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.moveTo(0, GROUND);
  ctx.lineTo(BASE_W, GROUND);
  ctx.stroke();

  // ground texture dots
  for(let gx=0;gx<BASE_W;gx+=30){
    ctx.beginPath();
    ctx.arc(gx, GROUND+8, 1, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(80,75,65,0.3)';
    ctx.fill();
  }
}

function drawParticles(){
  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    const col = p.type === 'jump'
      ? `rgba(180,170,155,${p.life*0.6})`
      : `rgba(220,210,195,${p.life*0.8})`;
    ctx.fillStyle = col;
    ctx.fill();
  });
}

// --- collision ---
function collides(a, b){
  return a.x < b.x+b.w && a.x+a.w > b.x &&
         a.y < b.y+b.h && a.y+a.h > b.y;
}

// --- game loop ---
let last = 0;
function loop(ts){
  const dt = Math.min((ts-last)/16.67, 3);
  last = ts;

  ctx.clearRect(0,0,BASE_W,BASE_H);
  drawBg();

  if(state === 'playing'){
    frame++;
    scoreTimer += dt;
    if(scoreTimer > 6){ score++; scoreTimer=0; liveScoreEl.textContent = score; }

    // speed ramp
    speed = 4 + score*0.04;

    // bg scroll
    stars.forEach(s=>{ s.x -= s.spd*dt; if(s.x<0) s.x=BASE_W; });
    bgPillars.forEach(p=>{ p.x -= p.spd*dt; if(p.x+p.w<0){ p.x=BASE_W+20; p.h=Math.random()*80+40; p.w=Math.random()*18+8; } });
    midPillars.forEach(p=>{ p.x -= p.spd*dt*2; if(p.x+p.w<0){ p.x=BASE_W+20; p.h=Math.random()*50+20; p.w=Math.random()*12+6; } });

    // player physics
    player.vy += GRAVITY*dt;
    player.y += player.vy*dt;
    if(player.y >= GROUND){
      player.y = GROUND;
      player.vy = 0;
      player.jumps = 0;
    }
    player.cape += 0.12*dt;

    // trail
    player.trail.unshift({x:player.x, y:player.y});
    if(player.trail.length > 8) player.trail.pop();

    // obstacles
    nextObstacle -= speed*dt;
    if(nextObstacle <= 0){
      spawnObstacle();
      const gap = 180 - Math.min(score*1.5, 80);
      nextObstacle = gap + Math.random()*80;
    }
    obstacles.forEach(o=>{
      o.x -= o.spd*dt;
      // update floater y reference
      if(o.type==='floater') o.spd = speed*0.9;
      else o.spd = speed;
    });
    obstacles = obstacles.filter(o=>o.x+o.w > -10);

    // collision check
    const hitbox = {x:player.x+4, y:player.y+4, w:player.w-8, h:player.h-4};
    for(const o of obstacles){
      const ob = o.type==='floater'
        ? {x:o.x, y:o.y+Math.sin(frame*0.05+o.x)*6, w:o.w, h:o.h}
        : o;
      if(collides(hitbox, ob)){ die(); break; }
    }

    // particles
    particles.forEach(p=>{
      p.x+=p.vx*dt; p.y+=p.vy*dt;
      p.vy+=0.15*dt;
      p.life-=p.decay*dt;
    });
    particles = particles.filter(p=>p.life>0);
  }

  // draw obstacles
  obstacles.forEach(drawObstacle);
  drawParticles();
  drawPlayer();

  // vignette
  const vg = ctx.createRadialGradient(BASE_W/2,BASE_H/2,BASE_H*0.3,BASE_W/2,BASE_H/2,BASE_H*0.9);
  vg.addColorStop(0,'rgba(0,0,0,0)');
  vg.addColorStop(1,'rgba(0,0,0,0.55)');
  ctx.fillStyle = vg;
  ctx.fillRect(0,0,BASE_W,BASE_H);

  requestAnimationFrame(loop);
}

// --- input ---
document.addEventListener('keydown', e=>{
  if(e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW'){
    e.preventDefault();
    if(state==='idle'||state==='dead') return;
    jump();
  }
});
canvas.addEventListener('pointerdown', e=>{
  e.preventDefault();
  if(state==='idle'||state==='dead') return;
  jump();
});

screenBtn.addEventListener('click', startGame);
document.addEventListener('keydown', e=>{
  if((e.code==='Enter'||e.code==='Space') && (state==='idle'||state==='dead')){
    e.preventDefault();
    startGame();
  }
});

requestAnimationFrame(loop);
</script>
</body>
</html>
